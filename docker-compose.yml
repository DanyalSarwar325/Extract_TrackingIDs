version: '3.8'

services:
  invoice-pdf-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-pdf-service
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: production
      LOG_LEVEL: info
      NEXT_APP_URL: http://host.docker.internal:3000
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
